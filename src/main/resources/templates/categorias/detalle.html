<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${categoria.nombre})}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<!-- Header de categoria -->
<section class="cat-header-section">
    <div class="container py-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb breadcrumb-custom">
                <li class="breadcrumb-item"><a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a></li>
                <li class="breadcrumb-item active" th:text="${categoria.nombre}">Categoria</li>
            </ol>
        </nav>
        <div class="d-flex align-items-center gap-3 mt-3">
            <div class="cat-header-icon">
                <i th:class="${categoria.icono}"></i>
            </div>
            <div>
                <h1 class="cat-header-title" th:text="${categoria.nombre}">Categoria</h1>
                <p class="cat-header-desc" th:text="${categoria.descripcion}">Descripcion</p>
            </div>
        </div>
    </div>
</section>

<!-- Grid de productos -->
<section class="section-productos-grid">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <p class="results-count">
                <span th:text="${#lists.size(productos)}">0</span> productos disponibles
            </p>
        </div>

        <div class="row g-4">
            <div th:each="prod : ${productos}" class="col-6 col-md-4 col-lg-3">
                <div class="product-card">
                    <a th:href="@{/producto/{id}(id=${prod.id})}" class="product-img-link">
                        <div class="product-img-wrapper">
                            <img th:src="${prod.imagenUrl}"
                                 th:alt="${prod.nombre}"
                                 class="product-img"
                                 onerror="this.src='/images/placeholder.svg'">
                            <span class="product-badge-unit" th:text="'x ' + ${prod.unidad}">x kg</span>
                        </div>
                    </a>
                    <div class="product-info">
                        <span class="product-provider" th:text="${prod.proveedor}">Proveedor</span>
                        <a th:href="@{/producto/{id}(id=${prod.id})}" class="product-name-link">
                            <h6 class="product-name" th:text="${prod.nombre}">Producto</h6>
                        </a>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="product-price"
                                  th:text="'S/ ' + ${#numbers.formatDecimal(prod.precio, 1, 2)}">S/ 0.00</span>
                            <form th:action="@{/carrito/agregar-rapido}" method="post" class="d-inline">
                                <input type="hidden" name="productoId" th:value="${prod.id}">
                                <input type="hidden" name="cantidad" value="1">
                                <input type="hidden" name="returnUrl"
                                       th:value="'/categoria/' + ${categoria.slug}">
                                <button type="submit" class="btn btn-add-cart" title="Agregar al carrito">
                                    <i class="bi bi-cart-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mensaje si no hay productos -->
        <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5">
            <i class="bi bi-inbox fs-1 text-muted"></i>
            <p class="text-muted mt-3">No hay productos disponibles en esta categoria</p>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/modals :: modals}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>

<!-- Toast si viene de agregar al carrito -->
<script th:if="${mensaje}">
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('toastMensaje').textContent = '[[${mensaje}]]';
        new bootstrap.Toast(document.getElementById('toastCarrito')).show();
    });
</script>
</body>
</html>
