<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador - Mercado Yuli</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d1f0d 0%, #1a3d1a 50%, #1a5c2a 100%);
        }
        .admin-card {
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .admin-header {
            background: linear-gradient(135deg, #1a5c2a, #2d8a47);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            color: white;
        }
        .admin-body { padding: 2rem; background: white; }
        .admin-icon {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .form-control:focus {
            border-color: #1a5c2a;
            box-shadow: 0 0 0 0.2rem rgba(26,92,42,.2);
        }
        .btn-admin {
            background: linear-gradient(135deg, #1a5c2a, #2d8a47);
            border: none;
            color: white;
            padding: .75rem;
            border-radius: 10px;
            font-weight: 600;
            letter-spacing: .03em;
        }
        .btn-admin:hover { background: linear-gradient(135deg, #154d23, #267a3e); color: white; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="admin-header">
        <div class="admin-icon">
            <i class="bi bi-shield-fill-check text-warning"></i>
        </div>
        <h4 class="fw-bold mb-1">Panel Administrador</h4>
        <p class="mb-0 opacity-75 small">Mercado Yuli Online</p>
    </div>

    <div class="admin-body">

        <!-- Error -->
        <div th:if="${error}"
             class="alert alert-danger d-flex align-items-center gap-2 mb-4 py-2"
             role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/admin/login}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold text-dark">
                    <i class="bi bi-envelope me-1"></i> Correo electrónico
                </label>
                <input type="email" name="email" class="form-control form-control-lg"
                       placeholder="admin@mercadoyuli.com" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold text-dark">
                    <i class="bi bi-lock me-1"></i> Contraseña
                </label>
                <input type="password" name="password" class="form-control form-control-lg"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-admin w-100 btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Panel
            </button>

        </form>

        <hr class="my-4">

        <div class="text-center">
            <a th:href="@{/}" class="text-muted text-decoration-none small">
                <i class="bi bi-arrow-left me-1"></i> Volver a la tienda
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
