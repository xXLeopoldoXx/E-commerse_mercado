<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Admin - Productos')}"></head>
<body style="background:#f4f6f8;">

<nav th:replace="~{fragments/adminnav :: adminnav}"></nav>

<div class="container-fluid py-4 px-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-box-seam me-2 text-success"></i>Gestión de Productos</h4>
        <a th:href="@{/admin/productos/nuevo}" class="btn btn-success">
            <i class="bi bi-plus-circle me-1"></i> Nuevo Producto
        </a>
    </div>

    <!-- Mensaje flash -->
    <div th:if="${mensajeAdmin}" th:with="partes=${mensajeAdmin.split(':',2)}"
         th:class="'alert ' + (${partes[0]} == 'OK' ? 'alert-success' : 'alert-danger') + ' alert-dismissible fade show'"
         role="alert">
        <i th:class="'bi ' + (${partes[0]} == 'OK' ? 'bi-check-circle' : 'bi-exclamation-triangle') + ' me-2'"></i>
        <span th:text="${partes[1]}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead style="background:#1a5c2a; color:white;">
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Proveedor</th>
                            <th>Unidad</th>
                            <th>Estado</th>
                            <th class="text-center pe-3">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${productos}">
                            <td class="ps-3 text-muted small" th:text="${p.id}"></td>
                            <td>
                                <img th:src="${p.imagenUrl}" th:alt="${p.nombre}"
                                     style="width:44px;height:44px;object-fit:cover;border-radius:8px;border:1px solid #eee;"
                                     onerror="this.style.display='none'">
                            </td>
                            <td class="fw-semibold" th:text="${p.nombre}"></td>
                            <td>
                                <span class="badge rounded-pill"
                                      style="background:#e8f5e9;color:#1a5c2a;font-size:.78rem;"
                                      th:text="${p.categoria?.nombre ?: '—'}"></span>
                            </td>
                            <td class="fw-semibold text-success"
                                th:text="'S/ ' + ${#numbers.formatDecimal(p.precio,1,2)}"></td>
                            <td>
                                <span th:if="${p.stock == 0}"
                                      class="badge bg-danger">Sin stock</span>
                                <span th:if="${p.stock > 0 and p.stock <= 10}"
                                      class="badge bg-warning text-dark"
                                      th:text="${p.stock} + ' und.'">Bajo</span>
                                <span th:if="${p.stock > 10}"
                                      class="badge bg-success"
                                      th:text="${p.stock} + ' und.'">OK</span>
                            </td>
                            <td class="small text-muted" th:text="${p.proveedor}"></td>
                            <td class="small" th:text="${p.unidad}"></td>
                            <td>
                                <span th:if="${p.disponible}" class="badge bg-success">Activo</span>
                                <span th:unless="${p.disponible}" class="badge bg-secondary">Inactivo</span>
                            </td>
                            <td class="text-center pe-3">
                                <a th:href="@{/admin/productos/editar/{id}(id=${p.id})}"
                                   class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/productos/eliminar/{id}(id=${p.id})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('¿Eliminar este producto?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(productos)}">
                            <td colspan="10" class="text-center text-muted py-5">
                                <i class="bi bi-inbox fs-2 d-block mb-2"></i> Sin productos registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white text-muted small border-top">
            <strong th:text="${#lists.size(productos)}">0</strong> productos en total
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
