<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- NAVBAR -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top my-navbar">
    <div class="container">
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <i class="bi bi-shop fs-4"></i>
            <span class="brand-text">Mercado <strong>Yuli</strong></span>
        </a>

        <!-- Toggler movil -->
        <div class="d-flex align-items-center gap-2 d-lg-none">
            <a th:href="@{/carrito}" class="btn btn-cart-mobile position-relative">
                <i class="bi bi-cart3"></i>
                <span th:if="${carritoCount > 0}" class="badge-cart" th:text="${carritoCount}">0</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarMain" aria-controls="navbarMain"
                    aria-expanded="false" aria-label="Menu">
                <i class="bi bi-list"></i>
            </button>
        </div>

        <div class="collapse navbar-collapse" id="navbarMain">
            <!-- Buscador -->
            <form class="search-form mx-lg-4 my-2 my-lg-0" th:action="@{/buscar}" method="get">
                <div class="input-group">
                    <input type="text" class="form-control search-input" name="q"
                           placeholder="Buscar productos..." autocomplete="off">
                    <button class="btn btn-search" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>

            <!-- Links categorias -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-grid me-1"></i> Categorias
                    </a>
                    <ul class="dropdown-menu dropdown-menu-custom">
                        <li th:each="cat : ${categorias}">
                            <a class="dropdown-item" th:href="@{/categoria/{slug}(slug=${cat.slug})}">
                                <i th:class="${cat.icono} + ' me-2'"></i>
                                <span th:text="${cat.nombre}">Categoria</span>
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>

            <!-- Botones derecha -->
            <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
                <button class="btn btn-nav-outline" data-bs-toggle="modal" data-bs-target="#loginModal">
                    <i class="bi bi-person me-1"></i> Ingresar
                </button>
                <button class="btn btn-nav-filled" data-bs-toggle="modal" data-bs-target="#registerModal">
                    <i class="bi bi-person-plus me-1"></i> Registro
                </button>
                <a th:href="@{/carrito}" class="btn btn-cart-nav position-relative d-none d-lg-flex">
                    <i class="bi bi-cart3"></i>
                    <span th:if="${carritoCount > 0}" class="badge-cart" th:text="${carritoCount}">0</span>
                </a>
            </div>
        </div>
    </div>
</nav>

</html>
