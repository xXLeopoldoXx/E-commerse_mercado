<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- NAVBAR -->
<th:block th:fragment="navbar">
<nav class="navbar navbar-expand-lg sticky-top my-navbar">
    <div class="container">
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <i class="bi bi-shop fs-4"></i>
            <span class="brand-text">Mercado <strong>Yuli</strong></span>
        </a>

        <!-- Toggler movil -->
        <div class="d-flex align-items-center gap-2 d-lg-none">
            <a role="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasCarrito"
               class="btn btn-cart-mobile position-relative" style="cursor:pointer">
                <i class="bi bi-cart3"></i>
                <span class="badge-cart" th:text="${carritoCount}"
                      th:style="${carritoCount > 0} ? '' : 'display:none'">0</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarMain" aria-controls="navbarMain"
                    aria-expanded="false" aria-label="Menu">
                <i class="bi bi-list"></i>
            </button>
        </div>

        <div class="collapse navbar-collapse" id="navbarMain">
            <!-- Buscador -->
            <form class="search-form mx-lg-4 my-2 my-lg-0" th:action="@{/buscar}" method="get">
                <div class="input-group">
                    <input type="text" class="form-control search-input" name="q"
                           placeholder="Buscar productos..." autocomplete="off">
                    <button class="btn btn-search" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>

            <!-- Links categorias -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-grid me-1"></i> Categorias
                    </a>
                    <ul class="dropdown-menu dropdown-menu-custom">
                        <li th:each="cat : ${categorias}">
                            <a class="dropdown-item" th:href="@{/categoria/{slug}(slug=${cat.slug})}">
                                <i th:class="${cat.icono} + ' me-2'"></i>
                                <span th:text="${cat.nombre}">Categoria</span>
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>

            <!-- Botones derecha -->
            <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
                <!-- Si NO esta logueado -->
                <div th:if="${usuarioLogueado == null}" class="d-flex gap-2">
                    <button class="btn btn-nav-outline" data-bs-toggle="modal" data-bs-target="#loginModal">
                        <i class="bi bi-person me-1"></i> Ingresar
                    </button>
                    <button class="btn btn-nav-filled" data-bs-toggle="modal" data-bs-target="#registerModal">
                        <i class="bi bi-person-plus me-1"></i> Registro
                    </button>
                </div>
                <!-- Si esta logueado -->
                <div th:if="${usuarioLogueado != null}" class="d-flex align-items-center gap-2">
                    <div class="dropdown">
                        <button class="btn btn-nav-user dropdown-toggle d-flex align-items-center gap-2"
                                type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="nav-user-avatar">
                                <span th:text="${usuarioLogueado.nombre.substring(0,1).toUpperCase()}">U</span>
                            </div>
                            <span class="usuario-bienvenida d-none d-md-inline"
                                  th:text="${usuarioLogueado.nombre.split(' ')[0]}">Usuario</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-user">
                            <li class="dropdown-header">
                                <div class="d-flex align-items-center gap-2 p-2">
                                    <div class="nav-user-avatar-lg">
                                        <span th:text="${usuarioLogueado.nombre.substring(0,1).toUpperCase()}">U</span>
                                    </div>
                                    <div>
                                        <div class="fw-semibold" th:text="${usuarioLogueado.nombre}">Nombre</div>
                                        <small class="text-muted" th:text="${usuarioLogueado.email}">email</small>
                                    </div>
                                </div>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item" th:href="@{/mi-cuenta}">
                                    <i class="bi bi-person-lines-fill me-2 text-success"></i>Mi Cuenta
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/mi-cuenta}">
                                    <i class="bi bi-bag-check me-2 text-success"></i>Mis Pedidos
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger" th:href="@{/logout}">
                                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesion
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
                <a role="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasCarrito"
                   class="btn btn-cart-nav position-relative d-none d-lg-flex" style="cursor:pointer">
                    <i class="bi bi-cart3"></i>
                    <span class="badge-cart" th:text="${carritoCount}"
                          th:style="${carritoCount > 0} ? '' : 'display:none'">0</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- ======== CARRITO FLOTANTE (offcanvas) - fuera del nav para que no se rompa en desktop ======== -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasCarrito" aria-labelledby="offcanvasCarritoLabel">
        <div class="offcanvas-header text-white" style="background:var(--verde-oscuro,#1a5c2a)">
            <h5 class="offcanvas-title mb-0" id="offcanvasCarritoLabel">
                <i class="bi bi-cart3 me-2"></i>Tu Carrito
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-0">
            <!-- Lista de items (se llena por JS) -->
            <div id="cartItems" class="flex-grow-1 overflow-auto p-3">
                <div class="text-center text-muted py-5" id="cartEmpty">
                    <i class="bi bi-cart-x d-block" style="font-size:2.5rem"></i>
                    <p class="mt-2 mb-0">Tu carrito esta vacio</p>
                </div>
            </div>
            <!-- Pie con total y botones -->
            <div class="border-top p-3" id="cartFooter" style="display:none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fw-semibold">Total</span>
                    <span class="fw-bold fs-5" style="color:var(--verde-oscuro,#1a5c2a)" id="cartTotal">S/ 0.00</span>
                </div>
                <a th:href="@{/carrito}" class="btn btn-outline-secondary w-100 mb-2">
                    <i class="bi bi-cart3 me-1"></i>Ver carrito completo
                </a>
                <a th:href="@{/checkout}" class="btn btn-checkout w-100">
                    <i class="bi bi-lock me-1"></i>Proceder al Pago
                </a>
            </div>
        </div>
    </div>
</th:block>

</html>
