<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Recuperar contrasena')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width:480px;">
        <div class="checkout-card">
            <div class="text-center mb-3">
                <div class="success-icon-wrapper mb-2" style="background:var(--verde-claro)">
                    <i class="bi bi-key-fill" style="color:var(--verde-oscuro)"></i>
                </div>
                <h4 class="fw-bold mb-1">Recuperar contrasena</h4>
                <p class="text-muted" style="font-size:.9rem">
                    Ingresa tu correo y te enviaremos un enlace para restablecerla.
                </p>
            </div>

            <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/recuperar}" method="post" novalidate>
                <label class="form-label fw-semibold">Correo electronico</label>
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control my-input" name="email"
                           placeholder="tu@correo.com" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100">
                    <i class="bi bi-send me-2"></i>Enviar enlace
                </button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/}" class="link-register"><i class="bi bi-arrow-left me-1"></i>Volver al inicio</a>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/modals :: modals}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
