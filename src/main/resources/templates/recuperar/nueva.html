<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nueva contrasena')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width:480px;">
        <div class="checkout-card">
            <div class="text-center mb-3">
                <div class="success-icon-wrapper mb-2" style="background:var(--verde-claro)">
                    <i class="bi bi-shield-lock-fill" style="color:var(--verde-oscuro)"></i>
                </div>
                <h4 class="fw-bold mb-1">Nueva contrasena</h4>
                <p class="text-muted" style="font-size:.9rem">Escribe tu nueva contrasena.</p>
            </div>

            <form th:action="@{/recuperar/restablecer}" method="post" novalidate>
                <input type="hidden" name="token" th:value="${token}">

                <label class="form-label fw-semibold">Nueva contrasena <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control my-input" name="password"
                           placeholder="Minimo 8 caracteres"
                           th:classappend="${errorPassword} ? 'is-invalid' : ''">
                </div>
                <div class="invalid-feedback d-block" style="font-size:.82rem" th:text="${errorPassword}"></div>

                <label class="form-label fw-semibold mt-3">Repetir contrasena <span class="text-danger">*</span></label>
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control my-input" name="password2"
                           placeholder="Repite la contrasena">
                </div>

                <button type="submit" class="btn btn-primary-custom w-100">
                    <i class="bi bi-check-circle me-2"></i>Guardar contrasena
                </button>
            </form>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/modals :: modals}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
