<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Buscar')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section class="section-buscar">
    <div class="container py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb breadcrumb-custom">
                <li class="breadcrumb-item"><a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a></li>
                <li class="breadcrumb-item active">Resultados de busqueda</li>
            </ol>
        </nav>

        <h2 class="section-title mt-3">
            <i class="bi bi-search me-2"></i>Resultados para
            "<span th:text="${query}">busqueda</span>"
        </h2>
        <p class="results-count mt-2">
            <span th:text="${#lists.size(resultados)}">0</span> productos encontrados
        </p>

        <!-- Resultados -->
        <div th:unless="${#lists.isEmpty(resultados)}" class="row g-4 mt-2">
            <div th:each="prod : ${resultados}" class="col-6 col-md-4 col-lg-3">
                <div class="product-card">
                    <a th:href="@{/producto/{id}(id=${prod.id})}" class="product-img-link">
                        <div class="product-img-wrapper">
                            <img th:src="${prod.imagenUrl}" th:alt="${prod.nombre}"
                                 class="product-img"
                                 onerror="this.src='/images/placeholder.svg'">
                            <span class="product-badge-cat" th:text="${prod.categoria.nombre}">Cat</span>
                        </div>
                    </a>
                    <div class="product-info">
                        <span class="product-provider" th:text="${prod.proveedor}">Proveedor</span>
                        <a th:href="@{/producto/{id}(id=${prod.id})}" class="product-name-link">
                            <h6 class="product-name" th:text="${prod.nombre}">Producto</h6>
                        </a>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="product-price"
                                  th:text="'S/ ' + ${#numbers.formatDecimal(prod.precio, 1, 2)}">S/ 0.00</span>
                            <form th:action="@{/carrito/agregar-rapido}" method="post" class="d-inline">
                                <input type="hidden" name="productoId" th:value="${prod.id}">
                                <input type="hidden" name="cantidad" value="1">
                                <input type="hidden" name="returnUrl"
                                       th:value="'/buscar?q=' + ${query}">
                                <button type="submit" class="btn btn-add-cart" title="Agregar al carrito">
                                    <i class="bi bi-cart-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sin resultados -->
        <div th:if="${#lists.isEmpty(resultados)}" class="text-center py-5">
            <i class="bi bi-search fs-1 text-muted"></i>
            <h4 class="mt-3 fw-bold">No encontramos resultados</h4>
            <p class="text-muted">Intenta con otra busqueda o explora nuestras categorias</p>
            <a th:href="@{/}" class="btn btn-primary-custom mt-3">
                <i class="bi bi-grid me-2"></i>Ver categorias
            </a>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/modals :: modals}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
