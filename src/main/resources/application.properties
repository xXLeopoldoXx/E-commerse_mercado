# ===========================
# Mercado Yuli Online
# ===========================
spring.application.name=Mercado Yuli Online

# Carga (si existe) un archivo local de secretos que NO se sube al repo.
# Ahi van MAIL_USERNAME y MAIL_PASSWORD. Ver secrets.properties.example
spring.config.import=optional:file:./secrets.properties

# Servidor
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===========================
# PostgreSQL Local
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/yuliBD
spring.datasource.username=postgres
spring.datasource.password=30334006
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Seguridad / JWT
# ===========================
# Clave secreta para firmar los JWT (minimo 32 caracteres para HS256)
app.jwt.secret=mercadoYuliClaveSecretaSuperSeguraParaFirmarTokensJWT2026
# Duracion del token en milisegundos (24 horas)
app.jwt.expiration-ms=86400000

# ===========================
# Correo (recuperacion de contrasena)
#   Las credenciales se leen de variables de entorno para NO subirlas al repo:
#     MAIL_USERNAME = tu correo Gmail
#     MAIL_PASSWORD = tu "Contrasena de aplicacion" de Gmail (16 caracteres)
#   (Para pruebas rapidas puedes reemplazar ${MAIL_...} por el valor directo,
#    pero NO hagas commit de la contrasena en un repo publico.)
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
# Direccion base para armar el enlace de recuperacion
app.url-base=http://localhost:8080
