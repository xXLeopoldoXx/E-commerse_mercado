# ===========================
# Mercado Yuli Online
# ===========================
spring.application.name=Mercado Yuli Online

# Servidor
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===========================
# PostgreSQL Local
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/yuliBD
spring.datasource.username=postgres
spring.datasource.password=30334006
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Seguridad / JWT
# ===========================
# Clave secreta para firmar los JWT (minimo 32 caracteres para HS256)
app.jwt.secret=mercadoYuliClaveSecretaSuperSeguraParaFirmarTokensJWT2026
# Duracion del token en milisegundos (24 horas)
app.jwt.expiration-ms=86400000

# ===========================
# Correo (recuperacion de contrasena)
#   Rellena username/password con tus credenciales SMTP.
#   Para Gmail usa una "Contrasena de aplicacion" (no la normal).
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_CORREO@gmail.com
spring.mail.password=TU_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Direccion base para armar el enlace de recuperacion
app.url-base=http://localhost:8080
